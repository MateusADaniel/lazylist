name: FOSSA scan
run-name: FOSSA SCA scan
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: FOSSA test
        uses: fossas/fossa-action@v1
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
        env:
          FOSSA_LOG_LEVEL: debug
