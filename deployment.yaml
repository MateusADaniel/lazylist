apiVersion: v1
kind: Namespace
metadata:
  name: lazylist
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lazylist-secrets
  namespace: lazylist
spec:
  encryptedData:
    ADMIN_EMAIL: 
    ADMIN_PASSWORD: 
    JWT_SECRET: 
    MYSQL_PASSWORD: 
    MYSQL_ROOT_PASSWORD: 
    MYSQL_USER: 
  template:
    metadata:
      name: lazylist-secrets
      namespace: lazylist
    type: Opaque

---
apiVersion: v1
kind: Service
metadata:
  name: db-users
  namespace: lazylist
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: db-users
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: lazylist
spec:
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: auth-service
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: lazylist
spec:
  ports:
    - port: 5002
      targetPort: 5002
  selector:
    app: task-service

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-users
  namespace: lazylist
spec:
  serviceName: db-users
  replicas: 1
  selector:
    matchLabels:
      app: db-users
  template:
    metadata:
      labels:
        app: db-users
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: lazylist_users
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: db-tasks
  namespace: lazylist
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: db-tasks

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-tasks
  namespace: lazylist
spec:
  serviceName: db-tasks
  replicas: 1
  selector:
    matchLabels:
      app: db-tasks
  template:
    metadata:
      labels:
        app: db-tasks
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: lazylist_tasks
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: lazylist
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: vhns123/cibsegdevsecops:lazy-auth
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: DB_HOST
              value: db-users
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: lazylist_users
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: JWT_SECRET

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: lazylist
spec:
  replicas: 3
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: vhns123/cibsegdevsecops:lazy-tasks
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          env:
            - name: DB_HOST
              value: db-tasks
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: lazylist_tasks
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: JWT_SECRET

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: lazylist
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: vhns123/cibsegdevsecops:lazy-gateway
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:5001
            - name: TASK_SERVICE_URL
              value: http://task-service:5002
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lazylist-secrets
                  key: JWT_SECRET

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: lazylist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: vhns123/cibsegdevsecops:lazy-web
          imagePullPolicy: Always
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: lazylist
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
